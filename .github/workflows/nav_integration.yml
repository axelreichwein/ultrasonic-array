name: nav_integration

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  gazebo_nav_integration:
    runs-on: ubuntu-22.04
    env:
      ROS_DISTRO: humble
      DEBIAN_FRONTEND: noninteractive

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup ROS 2
        uses: ros-tooling/setup-ros@v0.7
        with:
          required-ros-distributions: ${{ env.ROS_DISTRO }}

      - name: Install Gazebo and ROS dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ros-${ROS_DISTRO}-gazebo-ros-pkgs \
            ros-${ROS_DISTRO}-gazebo-plugins \
            python3-colcon-common-extensions

      - name: Install package dependencies
        run: |
          source /opt/ros/${ROS_DISTRO}/setup.bash
          rosdep update
          rosdep install --from-paths . -i -y

      - name: Build workspace
        run: |
          source /opt/ros/${ROS_DISTRO}/setup.bash
          colcon build --event-handlers console_cohesion+

      - name: Gazebo corridor tracking + obstacle response
        run: |
          source /opt/ros/${ROS_DISTRO}/setup.bash
          source install/setup.bash
          ./scripts/run_nav_integration.sh

      - name: Run verification tests
        run: |
          source /opt/ros/${ROS_DISTRO}/setup.bash
          source install/setup.bash
          colcon test --packages-select ultrasonic_array --event-handlers console_cohesion+
          colcon test-result --verbose
