name: nav_integration

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  pull_request:

permissions:
  contents: write

jobs:
  gazebo_nav_integration:
    runs-on: ubuntu-22.04
    env:
      ROS_DISTRO: humble
      DEBIAN_FRONTEND: noninteractive

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup ROS 2
        uses: ros-tooling/setup-ros@v0.7
        with:
          required-ros-distributions: ${{ env.ROS_DISTRO }}

      - name: Install Gazebo and ROS dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ros-${ROS_DISTRO}-gazebo-ros-pkgs \
            ros-${ROS_DISTRO}-gazebo-plugins \
            python3-colcon-common-extensions

      - name: Install package dependencies
        run: |
          source /opt/ros/${ROS_DISTRO}/setup.bash
          rosdep update
          rosdep install --from-paths . -i -y

      - name: Build workspace
        run: |
          source /opt/ros/${ROS_DISTRO}/setup.bash
          colcon build --event-handlers console_cohesion+

      - name: Gazebo corridor tracking + obstacle response
        run: |
          source /opt/ros/${ROS_DISTRO}/setup.bash
          source install/setup.bash
          ./scripts/run_nav_integration.sh

      - name: Run verification tests
        run: |
          source /opt/ros/${ROS_DISTRO}/setup.bash
          source install/setup.bash
          colcon test --packages-select ultrasonic_array --event-handlers console_cohesion+
          colcon test-result --verbose

      - name: Package software artifact
        run: |
          ARTIFACT_NAME="ultrasonic-array-${GITHUB_SHA:0:7}-ros2-${ROS_DISTRO}.tar.gz"
          tar -czf "${ARTIFACT_NAME}" \
            install/ \
            ultrasonic_array/package.xml \
            ultrasonic_array/config/lidar_proc.yaml \
            README.md \
            VVR-008.md
          echo "ARTIFACT_NAME=${ARTIFACT_NAME}" >> "${GITHUB_ENV}"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ultrasonic-array-${{ github.sha }}
          path: ${{ env.ARTIFACT_NAME }}
          retention-days: 30

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ARTIFACT_NAME }}
          generate_release_notes: true
